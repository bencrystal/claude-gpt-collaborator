services:
  - type: web
    name: claude-gpt-collaborator
    runtime: python
    buildCommand: pip install -r requirements.txt && cd client && npm install && npm run build
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
